<!DOCTYPE html>
<html>
<head>
    <title>AI Flappy Bird</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>🐦 AI Flappy Bird</h1>

<!-- START SCREEN -->
<div id="startScreen">
    <button onclick="showSettings()">▶ Start Game</button>
</div>

<!-- SETTINGS -->
<div id="settings" style="display:none;">
    <h2>Select Difficulty</h2>

    <select id="difficulty">
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
    </select>

    <h2>Speed</h2>
    <input type="range" id="speed" min="1" max="5" value="2">

    <br><br>
    <button onclick="startGame()">Start Playing</button>
</div>

<!-- GAME -->
<div id="gameUI" style="display:none;">
    <div class="scoreboard">
        Score: <span id="score">0</span> |
        Lives: <span id="lives">❤️❤️❤️</span>
    </div>

    <canvas id="gameCanvas"></canvas>

    <button class="jump-btn" onclick="jump()">⬆️ TAP TO JUMP</button>
</div>

<script src="/static/script.js"></script>

</body>
</html>

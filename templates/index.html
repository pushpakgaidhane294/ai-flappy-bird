<!DOCTYPE html>
<html>
<head>
    <title>AI Flappy Bird</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>🐦 AI Flappy Bird</h1>

<div class="scoreboard">
    Score: <span id="score">0</span> |
    High: <span id="high">0</span> |
    Lives: <span id="lives">❤️❤️❤️</span>
</div>

<p id="modeText">Mode: AI</p>

<canvas id="gameCanvas"></canvas>

<div>
    <button onclick="setMode('AI')">AI Mode</button>
    <button onclick="setMode('HUMAN')">Manual Mode</button>
</div>

<div>
    <label>Speed:</label>
    <input type="range" min="1" max="5" value="2" onchange="gameSpeed=this.value">
</div>

<script src="/static/script.js"></script>

</body>
</html>
